---
- name: Dev Environment Setup
  hosts: all
  become: true
  become_method: sudo
  gather_facts: false

  vars:
    deploy_user: "{{ ansible_user }}"
    kakoune_repo_url: "https://github.com/rileytuttle/kakoune.git"
    user_home: "{{ '/root' if deploy_user == 'root' else '/home/' + deploy_user }}"
    configs_repo: "https://github.com/rileytuttle/Configs.git"

  tasks:

    # ── Bootstrap Python (raw doesn't need Python) ─────────────────
    - name: Bootstrap Python
      ansible.builtin.raw: |
        sudo dnf update -y && sudo dnf install -y python3
      changed_when: false

    - name: Gather facts (now that Python exists)
      ansible.builtin.setup:

    # ── Prerequisites ──────────────────────────────────────────────
    - name: Install required packages
      ansible.builtin.package:
        name:
          - git
          - curl
          - bash
          - fzf
        state: present

    - name: Install build tools
      ansible.builtin.dnf:
        name:
          - "@Development Tools"
          - gcc-c++
        state: present

    - name: Clone configs repo
      ansible.builtin.git:
        repo: "{{ configs_repo }}"
        dest: "{{ user_home }}/Configs"
        version: master
        force: false
      become: true
      become_user: "{{ deploy_user }}"

    # ── Oh My Bash ─────────────────────────────────────────────────
    - name: Check if Oh My Bash is already installed
      ansible.builtin.stat:
        path: "/{{ user_home }}/.oh-my-bash"
      register: omb_stat

    - name: Download Oh My Bash installer
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/ohmybash/oh-my-bash/master/tools/install.sh"
        dest: "/tmp/omb_install.sh"
        mode: "0755"
      when: not omb_stat.stat.exists

    - name: Install Oh My Bash (unattended)
      ansible.builtin.shell: |
        bash /tmp/omb_install.sh --unattended
      become: true
      become_user: "{{ deploy_user }}"
      when: not omb_stat.stat.exists

    - name: Clean up installer script
      ansible.builtin.file:
        path: "/tmp/omb_install.sh"
        state: absent

    # ── Clone & Build ──────────────────────────────────────────────
    - name: Clone the target repository
      ansible.builtin.git:
        repo: "{{ kakoune_repo_url }}"
        dest: "{{ user_home }}/kakoune"
        version: master        # branch / tag / commit
        force: false           # set true to overwrite local changes
      become: true
      become_user: "{{ deploy_user }}"

    - name: Build the project
      ansible.builtin.command:
        cmd: make
        chdir: "{{ user_home }}/kakoune"
      become: true
      become_user: "{{ deploy_user }}"
      register: build_output
      changed_when: build_output.rc == 0

    - name: Show build output
      ansible.builtin.debug:
        var: build_output.stdout_lines

    - name: Create directories
      ansible.builtin.file:
        path: "{{ user_home }}/.config/{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: 0755
      loop:
        - kak
        - kanata

    - name: Create symlinks
      ansible.builtin.file:
        src: "{{ user_home }}/Configs/dotfiles/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
      loop:
        - { src: ".tmux.conf", dest: ".tmux.conf" }
        - { src: "kakrc/kakrc", dest: ".config/kak/kakrc" }
        - { src: "kanataconfig.kbd", dest: ".config/kanata/kanataconfig.kbd"}

    - name: add to env PATH
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: "[ -d {{ item }} ] && export PATH={{ item }}:$PATH"
        state: present
      loop:
        - "{{ user_home }}/kakoune/src"

    - name: add sources
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: "[ -f {{ item }} ] && source {{ item }}"
        state: present
      loop:
        - "Configs/bash-scripts/git-scripts.sh"
        - "Configs/bash-scripts/auto-completes.sh"
